<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet - Spero</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <div class="chat-wrapper">
        <!-- Sohbet Header -->
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">R</div>
                <div>
                    <h3>Spero</h3>
                    <span>Manevi danisman</span>
                </div>
            </div>
            <button id="new-convo-btn" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">
                Yeni Konusma
            </button>
        </div>

        <!-- API Key Uyarısı -->
        <div id="api-warning" class="api-warning" style="display:none; margin: 0; border-radius: 0;">
            &#9888; Sohbet icin API anahtari gerekli.
            <a href="settings.html">Ayarlar'a git</a>
        </div>

        <!-- Mesajlar -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Giriş Alanı -->
        <div class="chat-input-area">
            <textarea
                id="chat-input"
                rows="1"
                placeholder="Mesajinizi yazin..."
                autocomplete="off"
            ></textarea>
            <button id="send-btn" class="chat-send-btn" title="Gonder">
                &#10148;
            </button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2a1b4a">
    <meta name="robots" content="noindex, nofollow">
    <title>Ayarlar — JESSE</title>
    <link rel="icon" type="image/jpeg" href="assets/jesse-logo.jpg">
    <link rel="apple-touch-icon" href="assets/jesse-logo.jpg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Ayarlar</h2>

        <!-- Hesap Bilgisi -->
        <div class="card settings-section">
            <h3>Hesap</h3>
            <p style="font-size:0.95rem; color:var(--text-light);">Giriş yapan: <strong id="user-email" style="color:var(--primary);"></strong></p>
            <div class="info-box" style="margin-top:0.75rem;">
                Yapay zeka desteği sunucu üzerinden sağlanmaktadır. Herhangi bir API anahtarı girmenize gerek yoktur.
            </div>
        </div>

        <!-- Depolama -->
        <div class="card settings-section">
            <h3>Depolama Kullanimi</h3>
            <div id="storage-info">
                <p id="storage-text" style="font-size: 0.9rem; color: var(--text-light);"></p>
                <div class="storage-bar">
                    <div class="storage-bar-fill" id="storage-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- Tehlike Bölgesi -->
        <div class="danger-zone">
            <h4>Tehlikeli Bolge</h4>
            <p>Bu islem tum yerel verilerinizi (konusmalar, onbellek) kalici olarak siler.</p>
            <button class="btn btn-danger" onclick="clearAllData()">Tum Verileri Sil</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/supabase.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            App.renderNav();

            const session = Supabase.getSession();
            if (session && session.user) {
                document.getElementById('user-email').textContent = session.user.email || Auth.getCurrentUser();
            } else {
                document.getElementById('user-email').textContent = Auth.getCurrentUser();
            }

            updateStorageInfo();
        });

        function updateStorageInfo() {
            const usage = Storage.getStorageUsage();
            const maxMB = 5;
            const pct = Math.min((parseFloat(usage.usedMB) / maxMB) * 100, 100);
            document.getElementById('storage-text').textContent =
                usage.usedMB + ' MB / ' + maxMB + ' MB kullaniliyor';
            const bar = document.getElementById('storage-bar-fill');
            bar.style.width = pct + '%';
            if (usage.warningLevel) bar.classList.add('warning');
        }

        function clearAllData() {
            if (confirm('Tum yerel verileriniz silinecek. Emin misiniz?')) {
                Storage.clearAllData();
                showToast('Tum veriler silindi', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (type || '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
